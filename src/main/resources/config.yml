#------------------------------------------------------------------------------------------------------
#                         1MB XRAYHEURISTICS / XRAYER
#
#    Heuristic CoreProtect add-on for Paper 26.1.2 / Java 25.
#    Default values are tuned for vanilla-like ore generation.
#------------------------------------------------------------------------------------------------------

#----------------------------------------------
# HEURISTICALLY BASED MONITORING CONFIGURATIONS:
#----------------------------------------------

# AXH will only monitor player behaviour in the worlds listed below.
# Only overworld and nether environments are considered.
TrackWorlds:
  - 'general'
  - 'wild'
  - 'nether'

# Suspicion points required before the player is automatically handled as an xrayer.
SuspicionThreshold: 100.0

# If true, verbose mining-session calculations are written to console for debugging.
DebugVerboseMiningSession: false

# The following values are balanced around vanilla ore density.
# Set a weight to 0 to ignore that family completely.
# IronWeight also applies to RAW_IRON_BLOCK.
# CopperWeight also applies to RAW_COPPER_BLOCK.
# NetherGoldWeight also applies to GILDED_BLACKSTONE.
CoalWeight: 5.0
IronWeight: 5.0
CopperWeight: 5.0
GoldWeight: 5.0
RedstoneWeight: 9.0
EmeraldWeight: 22.0
LapisWeight: 8.0
DiamondWeight: 15.0
DeepslateCoal: 5.0
DeepslateIron: 5.0
DeepslateCopper: 5.0
DeepslateGold: 5.0
DeepslateRedstone: 9.0
DeepslateEmerald: 22.0
DeepslateLapis: 8.0
DeepslateDiamond: 22.0
NetherGoldWeight: 5.0
QuartzWeight: 5.0
AncientDebrisWeight: 22.0

# Reducers for biome-specific high-density ore generation.
FinalEmeraldWeightDivisionReducer: 2
FinalGoldWeightDivisionReducer: 4

# How far nearby blocks may still be treated as part of the same ore vein.
ConsiderAdjacentWithinDistance: 10

# Minimum amount of non-ore blocks mined before a newly found vein counts again.
MinimumBlocksMinedToNextVein: 10

# Ignore tracked mining above these heights.
IgnoreHigherThanOverworldAltitude: 65
IgnoreHigherThanNetherAltitude: 240

#------------------------------------------------------
# AUTOMATIC XRAYER HANDLING & PUNISHMENT CONFIGURATIONS:
#------------------------------------------------------

# If true, the player's inventory and equipment are stored before punish actions.
StoreCopy: false

# If true, the player's inventory and equipment are cleared after handling.
CleansePlayerItems: false

# Legacy typo kept for backward compatibility with older configs.
ClensePlayerItems: false

# If true, punished players receive PlayerMessageOnXray from locale.yml.
SendMessageToPlayer: false

# If true, the active suspicion session is removed after handling.
NullifySuspicionAfterPunish: true

# Legacy typo kept for backward compatibility with older configs.
NullifySuspicionAferPunish: true

# Commands run from console when a player is automatically handled.
# Available placeholders: {PlayerName}, {TimesDetected}
CommandsExecutedOnXrayerDetected:
  1:
    1: 'discordsrv broadcast #1400563773055701002 [co axh] `{PlayerName}` - detected `{TimesDetected}`x'
  2:
    2: 'discordsrv broadcast #1400563773055701002 [co axh] `{PlayerName}` - detected `{TimesDetected}`x'
  3:
    3: 'discordsrv broadcast #1400563773055701002 [co axh] `{PlayerName}` - detected `{TimesDetected}`x'
  4:
    4: 'discordsrv broadcast #1400563773055701002 [co axh] `{PlayerName}` - detected `{TimesDetected}`x'
  5:
    5: 'discordsrv broadcast #1400563773055701002 [co axh] `{PlayerName}` - detected `{TimesDetected}`x'

# Commands run from console when a player is absolved.
# Available placeholders: {PlayerName}
CommandsExecutedOnPlayerAbsolved: [ ]

# If true, players with xrayheuristics.notify / AXH.XrayerWarning are notified when a player is handled.
TellPlayersWithPermission: true

#----------------------
# STORAGE CONFIGURATION:
#----------------------

# Available values:
#   MYSQL - Uses the configured SQL server.
#   JSON  - Stores data inside the plugin data folder.
StorageType: 'JSON'

SQLDriverClassName: ''
SQLHost: '127.0.0.1'
SQLPort: '3306'
SQLDatabaseName: 'myDatabase'
SQLUsername: 'root'
SQLPassword: 'root'
SQLMaxActiveConnections: 10
UseDriverClassName: false

#------
# TOOLS:
#------

# If true, the legacy manual-handle syntax without a player name can add a dummy entry for testing.
AddRandomDummyXrayerIfNoXrayerCommandParameters: false

# If true, the GUI uses heads instead of stone placeholders for entries.
UseHeadsInGUI: false
